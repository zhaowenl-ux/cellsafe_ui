<h1 class="title">{{title}}</h1>
<mat-form-field style="width: 400px">
  <mat-select #select [formControl]="select_control" (selectionChange)="select_change(select.value)">
    @for (type of select_list; track type) {
      <mat-option [value]="type"> {{type.value}} </mat-option>
    }
  </mat-select>
</mat-form-field>
<hr />
<button mat-raised-button color="primary" (click)="add_term()"><mat-icon>add</mat-icon>Add Term</button>
<div style="width: 500px">
  <mat-table [dataSource]="dataSource" matSort>
    <!-- Position Column -->
    <ng-container matColumnDef="term">
      <mat-header-cell *matHeaderCellDef> Term</mat-header-cell>
      <mat-cell *matCellDef="let element">
        <button mat-mini-fab (click)="delete_term(element.term)">
          <mat-icon>delete</mat-icon>
        </button>
        &nbsp;&nbsp;&nbsp; {{element.term}}
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>
</div>
<button mat-raised-button color="primary" (click)="add_term()"><mat-icon>add</mat-icon>Add Term</button>
