<mat-card>
  <mat-card-content>
    <h2 class="example-h2">System configuration</h2>

    <section class="example-section">
      <mat-checkbox class="example-margin" [(ngModel)]="open_menu_new_window">Open Main Menu in New Window</mat-checkbox>
    </section>
    <section class="example-section">
      <mat-checkbox class="example-margin" [(ngModel)]="open_link_new_window">Open Searching Menu/Links in New Window</mat-checkbox>

    </section>
    </mat-card-content>
</mat-card>

<button  mat-raised-button color="primary" (click)="save_settings()">
    <mat-icon>save</mat-icon>Save
</button>
