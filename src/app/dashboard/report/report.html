@if(IsWait) {
  <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
}
<p class="title">{{title}}</p>
@if(ShowSelect) {
  <mat-form-field >
    <mat-select #select [(ngModel)]="selected_value" (selectionChange)="select_change(select.value)">
      @for (item of select_data; track item.id) {
        <mat-option [value]="item"> {{item.name}} </mat-option>
      }
    </mat-select>
  </mat-form-field>
}

<mat-table
  style="width: 100%"
  class="table-container"
  #table
  [dataSource]="dataSource"
  matSort>
  <caption class="title">{{table_title}} </caption>
  @for (column of tank_cap_columns; track column) {
    <ng-container [matColumnDef]="column.columnDef">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{column.header}}</th>
      <td mat-cell *matCellDef="let row">
        {{column.cell(row)}}
      </td>
    </ng-container>
  }
  <tr class="mat-row" *matNoDataRow>

    <tr mat-header-row *matHeaderRowDef="tank_cap_displayedColumns; sticky: true" class="header"></tr>
    <tr
      mat-row
      *matRowDef="let element; let even = even; let rowIndex = index; columns: tank_cap_displayedColumns;"
    [ngClass]="{gray: even}"></tr>
  <!--tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr-->
</mat-table>
